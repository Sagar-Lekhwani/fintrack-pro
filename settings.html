<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>FinTrack Pro | Settings</title>

    <!-- Google Font -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <!-- ================= Sidebar ================= -->

    <aside class="sidebar">

        <div>

            <div class="logo">

                <i class="fa-solid fa-layer-group"></i>

                <div>

                    <h2>FinTrack Pro</h2>

                    <span>Enterprise Finance</span>

                </div>

            </div>

            <nav class="sidebar-nav">

                <ul>

                    <li onclick="window.location='dashboard.html'">

                        <i class="fa-solid fa-table-columns"></i>

                        <span>Dashboard</span>

                    </li>

                    <li class="active">

                        <i class="fa-solid fa-gear"></i>

                        <span>Settings</span>

                    </li>

                </ul>

            </nav>

        </div>

        <button
            class="add-btn"
            onclick="window.location='dashboard.html'">

            <i class="fa-solid fa-arrow-left"></i>

            Dashboard

        </button>

    </aside>

    <!-- ================= Main ================= -->

    <main class="main">

        <!-- Navbar -->

        <header class="navbar">

            <div></div>

            <div class="user">

                <span id="profileName">

                    Guest

                </span>

                <button id="logoutBtn">

                    <i class="fa-solid fa-right-from-bracket"></i>

                    Logout

                </button>

            </div>

        </header>

        <!-- Heading -->

        <section class="page-title">

            <h1>

                Settings

            </h1>

            <p>

                Manage your account preferences

            </p>

        </section>

        <!-- Settings Card -->

        <section class="settings-container">

            <div class="settings-card">

                <h2>

                    Profile Details

                </h2>

                <p>

                    Update your profile information.

                </p>

                <form id="profileForm">

                    <div class="form-group">

                        <label>

                            Full Name

                        </label>

                        <input

                            type="text"

                            id="fullName"

                            placeholder="Enter your name"

                        >

                    </div>

                    <div class="form-group">

                        <label>

                            Preferred Currency

                        </label>

                        <select id="currency">

                            <option value="USD">

                                USD ($)

                            </option>

                            <option value="INR">

                                INR (₹)

                            </option>

                            <option value="EUR">

                                EUR (€)

                            </option>

                            <option value="GBP">

                                GBP (£)

                            </option>

                            <option value="JPY">

                                JPY (¥)

                            </option>

                        </select>

                    </div>

                    <button
                        type="submit">

                        <i class="fa-solid fa-floppy-disk"></i>

                        Save Changes

                    </button>

                </form>

            </div>

        </section>

    </main>

    <!-- Scripts -->

    <script src="js/storage.js"></script>

    <script src="js/currency.js"></script>

    <script src="js/settings.js"></script>

    <script src="js/utils.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
